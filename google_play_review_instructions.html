<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google Play Review Instructions — ExpenseManager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 15px; line-height: 1.7; color: #1a1a1a;
      background: #f8f9fa; max-width: 860px;
      margin: 0 auto; padding: 48px 24px 80px;
    }
    h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 6px; }
    h2 { font-size: 1.1rem; font-weight: 700; margin: 32px 0 10px; color: #111;
         border-left: 4px solid #1a73e8; padding-left: 10px; }
    h3 { font-size: 0.95rem; font-weight: 600; margin: 18px 0 6px; color: #333; }
    p  { margin-bottom: 10px; }
    ul { margin: 8px 0 12px 22px; }
    li { margin-bottom: 5px; }
    .meta { color: #666; font-size: 0.85rem; margin-bottom: 36px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px;
             font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .badge-req  { background: #fde8e8; color: #b91c1c; }
    .badge-info { background: #e0f0ff; color: #1a56db; }
    .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 20px 24px; margin: 16px 0; }
    .credentials { background: #f0f4ff; border: 1px solid #c7d7ff; border-radius: 8px;
                   padding: 16px 20px; margin: 12px 0; font-family: monospace; font-size: 0.95rem; }
    .credentials span { color: #888; font-style: italic; }
    .warning { background: #fffbeb; border: 1px solid #fcd34d; border-radius: 8px;
               padding: 12px 16px; margin: 12px 0; font-size: 0.9rem; }
    .step { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 10px; }
    .step-num { min-width: 26px; height: 26px; background: #1a73e8; color: #fff; border-radius: 50%;
                display: flex; align-items: center; justify-content: center;
                font-size: 0.8rem; font-weight: 700; flex-shrink: 0; margin-top: 2px; }
    table { width: 100%; border-collapse: collapse; margin: 12px 0 16px; font-size: 0.9rem; }
    th, td { border: 1px solid #ddd; padding: 9px 13px; text-align: left; vertical-align: top; }
    th { background: #f5f5f5; font-weight: 600; }
    .section-divider { border: none; border-top: 2px solid #e8e8e8; margin: 40px 0; }
    .plain-text-block { background: #1e1e2e; color: #cdd6f4; border-radius: 10px;
                        padding: 20px 24px; margin: 16px 0; font-family: monospace;
                        font-size: 0.88rem; white-space: pre-wrap; line-height: 1.6; }
    .lang-toggle { display: flex; gap: 8px; margin-bottom: 32px; }
    .lang-toggle button { padding: 6px 16px; border: 1px solid #ccc; border-radius: 6px;
                          background: #fff; cursor: pointer; font-size: 0.9rem; }
    .lang-toggle button.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  </style>
</head>
<body>

<script>
  /* ============================================================
     EDITA SOLO ESTA SECCIÓN — Edit only this section
     ============================================================ */
  const ACCOUNT = {
    email:    "test@expensemanager.app",   // ← cambia aquí el email
    password: "TestPass123!",              // ← cambia aquí la contraseña
    proActive: true,                       // ← true = Pro activado manualmente
  };
  /* ============================================================ */

  const T = {
    es: {
      title:      "Instrucciones de revisión para Google Play",
      meta:       "Última actualización: 6 de abril de 2026",
      badge:      "Acceso restringido",

      checkTitle: "Checklist: lo que debes preparar antes de enviar",
      checkIntro: "Antes de rellenar el formulario en Google Play Console, asegúrate de tener listo lo siguiente:",
      col1: "Elemento", col2: "Descripción", col3: "Estado",
      rows: [
        ["Cuenta de prueba (email/contraseña)",
         "Una cuenta real registrada en Supabase con datos de ejemplo ya cargados (transacciones, categorías personalizadas, etc.).",
         "req", "Obligatorio"],
        ["Plan Pro activo en la cuenta de prueba",
         "Activa manualmente el plan Pro desde Supabase o RevenueCat para que los revisores accedan a todas las funciones premium sin usar prueba gratuita.",
         "req", "Obligatorio"],
        ["Sin 2FA / verificación en dos pasos",
         "Desactiva cualquier verificación de dos pasos en la cuenta de prueba para que los revisores puedan acceder sin pasos adicionales.",
         "req", "Obligatorio"],
        ["Datos de ejemplo cargados",
         "Al menos 10–15 transacciones con distintas categorías para que los revisores puedan ver gráficas, resúmenes y el chat IA funcionando.",
         "info", "Recomendado"],
        ["Credenciales anotadas en el formulario",
         "El email y contraseña de la cuenta de prueba deben estar en el campo \"Access instructions\" de Google Play Console.",
         "req", "Obligatorio"],
        ["Login con Google / Apple",
         "Los revisores no pueden usar sus propias cuentas. Proporciona el flujo de email/contraseña como método principal.",
         "info", "Informativo"],
      ],
      warning: "<strong>Importante:</strong> Los revisores de Google Play <strong>no pueden</strong> crear cuentas propias, usar pruebas gratuitas ni contactar al desarrollador para pedir acceso. Todo el acceso debe estar habilitado desde el principio con las credenciales que proporcionas.",

      copyTitle: "Instrucciones para el revisor (texto para Google Play Console)",
      copyIntro: 'Copia y pega el siguiente texto en el campo <em>"Instructions for testers"</em> / <em>"Access instructions"</em> de Google Play Console.',

      stepsTitle: "Guía visual: flujo de acceso paso a paso",
      loginTitle: "1. Acceso a la app (login)",
      loginSteps: [
        "Abrir la app. Se muestra la pantalla de <strong>Login</strong> automáticamente.",
        "Introducir el email y contraseña de la cuenta de prueba. <strong>No usar Google ni Apple Sign-In.</strong>",
        'Pulsar <strong>"Iniciar sesión"</strong>. Se accede directamente al Dashboard.',
      ],
      proTitle: "2. Acceso a funciones Pro (suscripción)",
      proSteps: [
        "La cuenta de prueba tiene el <strong>plan Pro activado manualmente</strong> en el backend (Supabase). No se requiere ninguna compra ni prueba gratuita.",
        'Para confirmar: pulsar el icono de menú arriba a la derecha → pantalla <strong>"Plan Pro"</strong> → estado "Activo".',
        "Todas las funciones premium estarán disponibles de inmediato: chat IA, exportación Excel, transacciones recurrentes, categorías personalizadas.",
      ],
      navTitle: "3. Navegación principal",
      navItems: [
        "<strong>Dashboard</strong> — pantalla principal con resumen de gastos e ingresos.",
        "<strong>Transacciones</strong> — listado completo. Botón \"+\" para añadir.",
        "<strong>Gráficas</strong> — gráficas por categoría y por periodo.",
        "<strong>Chat IA</strong> — consultas en lenguaje natural sobre tus gastos (Pro).",
        "<strong>Ajustes</strong> — idioma (ES/EN), moneda, tema claro/oscuro.",
      ],

      credTitle: "Credenciales de la cuenta de prueba",
      credEmail: "Email",
      credPass:  "Contraseña",
      credPro:   "Plan Pro",
      credProVal: "Activado manualmente en el backend",
    },

    en: {
      title:      "Google Play Review Instructions",
      meta:       "Last updated: April 6, 2026",
      badge:      "Restricted access",

      checkTitle: "Developer checklist: what to prepare before submitting",
      checkIntro: "Before filling in the form in Google Play Console, make sure you have the following ready:",
      col1: "Item", col2: "Description", col3: "Status",
      rows: [
        ["Test account (email/password)",
         "A real Supabase account with sample data already loaded (transactions, custom categories, etc.).",
         "req", "Required"],
        ["Pro plan active on test account",
         "Manually activate the Pro plan via Supabase or RevenueCat so reviewers can access all premium features without a free trial.",
         "req", "Required"],
        ["No 2FA on test account",
         "Disable two-step verification so reviewers can log in without extra steps.",
         "req", "Required"],
        ["Sample data loaded",
         "At least 10–15 transactions across different categories so reviewers can see charts, summaries and AI chat working.",
         "info", "Recommended"],
        ["Credentials in Console",
         'Email and password must be entered in the "Access instructions" field in Google Play Console.',
         "req", "Required"],
        ["Google / Apple Sign-In",
         "Reviewers cannot use their own accounts. Provide email/password as the primary method.",
         "info", "Informational"],
      ],
      warning: "<strong>Important:</strong> Google Play reviewers <strong>cannot</strong> create their own accounts, use free trials, or contact the developer for access. All access must be pre-enabled from the start.",

      copyTitle: "Instructions for the reviewer (text for Google Play Console)",
      copyIntro: 'Copy and paste the following text into the <em>"Instructions for testers"</em> / <em>"Access instructions"</em> field in Google Play Console.',

      stepsTitle: "Step-by-step access guide",
      loginTitle: "1. Accessing the app (login)",
      loginSteps: [
        "Open the app. The <strong>Login</strong> screen appears automatically.",
        "Enter the test account email and password. <strong>Do not use Google or Apple Sign-In.</strong>",
        'Tap <strong>"Iniciar sesión"</strong> (Log in). You will land directly on the Dashboard.',
      ],
      proTitle: "2. Accessing Pro features (subscription)",
      proSteps: [
        "The test account has the <strong>Pro plan manually activated</strong> on the backend (Supabase). No purchase or free trial is required.",
        'To confirm: tap the top-right menu icon → <strong>"Plan Pro"</strong> screen → status should show "Active".',
        "All premium features are immediately available: AI chat, Excel export, recurring transactions, custom categories.",
      ],
      navTitle: "3. Main navigation",
      navItems: [
        "<strong>Dashboard</strong> — main screen with income/expense summary.",
        "<strong>Transactions</strong> — full list. Tap \"+\" to add.",
        "<strong>Charts</strong> — bar and pie charts by category and period.",
        "<strong>AI Chat</strong> — natural language expense queries (Pro).",
        "<strong>Settings</strong> — language (ES/EN), currency, light/dark theme.",
      ],

      credTitle: "Test account credentials",
      credEmail: "Email",
      credPass:  "Password",
      credPro:   "Pro Plan",
      credProVal: "Manually activated on the backend",
    },
  };

  function plainTextBlock(email, password) {
    return `=== ExpenseManager — Test Account Access Instructions ===

This app requires a registered account to access its features.
Please use the pre-configured test account below. Do NOT create a new account
or use Google/Apple Sign-In — use the email + password login only.

--- LOGIN CREDENTIALS ---
Email:    ${email}
Password: ${password}

--- HOW TO LOG IN ---
1. Open the app. The Login screen appears automatically.
2. Enter the email and password listed above.
3. Tap "Iniciar sesión" (Log in).
4. You will land on the Dashboard with sample transactions already loaded.

--- SUBSCRIPTION / PRO FEATURES ---
The test account has the Pro plan activated manually on the backend.
You do NOT need to make any purchase or start a free trial.
All Pro features (unlimited transactions, AI chat, advanced charts,
Excel export, custom categories, recurring transactions) are fully
accessible with this account.

To verify Pro status: tap the top-right menu → "Plan Pro" screen.
It should show the plan as active.

--- APP FEATURES OVERVIEW ---
• Dashboard:          summary of income/expenses by period
• Transactions:       add/edit/delete expenses and income
• Charts:             bar and pie charts grouped by category or period
• AI Chat:            natural language expense queries (Pro)
• Recurring:          scheduled recurring transactions (Pro)
• Export to Excel:    export transaction history (Pro)
• Custom categories:  create your own categories and subcategories (Pro)
• Settings:           language, currency, theme

--- NOTES ---
• No 2-factor authentication is enabled on this test account.
• No location permission is required to use the app.
• Internet connection is required (data is synced with Supabase).
• The app is available in Spanish and English (change in Settings → Language).

If you experience any access issues, please reject the build and leave
a note — we will resolve it immediately and resubmit.`;
  }

  function render(lang) {
    const t = T[lang];
    const a = ACCOUNT;
    let html = `
      <h1>${t.title}</h1>
      <p class="meta">App: <strong>ExpenseManager</strong> &nbsp;·&nbsp; ${t.meta} &nbsp;·&nbsp;
        <span class="badge badge-req">${t.badge}</span></p>

      <h2>${t.checkTitle}</h2>
      <p>${t.checkIntro}</p>
      <div class="card">
        <table>
          <thead><tr><th>${t.col1}</th><th>${t.col2}</th><th>${t.col3}</th></tr></thead>
          <tbody>
            ${t.rows.map(([name, desc, type, label]) => `
              <tr>
                <td><strong>${name}</strong></td>
                <td>${desc}</td>
                <td><span class="badge badge-${type}">${label}</span></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div class="warning">${t.warning}</div>

      <hr class="section-divider"/>

      <h2>${t.copyTitle}</h2>
      <p>${t.copyIntro}</p>
      <div class="plain-text-block">${escHtml(plainTextBlock(a.email, a.password))}</div>

      <hr class="section-divider"/>

      <h2>${t.stepsTitle}</h2>
      <div class="card">
        <h3>${t.loginTitle}</h3>
        ${t.loginSteps.map((s,i) => `<div class="step"><div class="step-num">${i+1}</div><div>${s}</div></div>`).join('')}
      </div>
      <div class="card">
        <h3>${t.proTitle}</h3>
        ${t.proSteps.map((s,i) => `<div class="step"><div class="step-num">${i+1}</div><div>${s}</div></div>`).join('')}
      </div>
      <div class="card">
        <h3>${t.navTitle}</h3>
        <ul>${t.navItems.map(s => `<li>${s}</li>`).join('')}</ul>
      </div>

      <hr class="section-divider"/>

      <h2>${t.credTitle}</h2>
      <div class="credentials">
        ${t.credEmail}: &nbsp;<strong>${escHtml(a.email)}</strong><br/>
        ${t.credPass}:  &nbsp;<strong>${escHtml(a.password)}</strong><br/>
        ${t.credPro}:   &nbsp;<strong>${t.credProVal}</strong>
      </div>`;

    document.getElementById('content').innerHTML = html;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showLang(lang, btn) {
    document.querySelectorAll('.lang-toggle button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(lang);
  }

  document.addEventListener('DOMContentLoaded', () => render('es'));
</script>

<div class="lang-toggle">
  <button class="active" onclick="showLang('es', this)">Español</button>
  <button onclick="showLang('en', this)">English</button>
</div>

<div id="content"></div>

</body>
</html>
